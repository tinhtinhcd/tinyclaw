<svg xmlns="http://www.w3.org/2000/svg" width="16" height="24" viewBox="0 0 16 24" shape-rendering="crispEdges">
  <!-- Shadow -->
  <ellipse cx="8" cy="23" rx="5" ry="1" fill="#00000033"/>
  <!-- Body (hoodie) -->
  <rect x="4" y="12" width="8" height="8" fill="#15803d"/>
  <rect x="5" y="12" width="6" height="8" fill="#22c55e"/>
  <!-- Hood -->
  <rect x="3" y="10" width="10" height="4" fill="#15803d"/>
  <!-- Hood opening -->
  <rect x="5" y="11" width="6" height="2" fill="#22c55e"/>
  <!-- Arms -->
  <rect x="2" y="13" width="2" height="5" fill="#15803d"/>
  <rect x="12" y="13" width="2" height="5" fill="#15803d"/>
  <!-- Head -->
  <rect x="4" y="2" width="8" height="10" fill="#f0c8a0"/>
  <!-- Hair (messy) -->
  <rect x="4" y="2" width="8" height="3" fill="#2d1f0e"/>
  <rect x="3" y="3" width="2" height="2" fill="#2d1f0e"/>
  <rect x="11" y="2" width="2" height="3" fill="#2d1f0e"/>
  <rect x="5" y="1" width="2" height="2" fill="#2d1f0e"/>
  <!-- Eyes -->
  <rect x="6" y="7" width="1" height="1" fill="#1a1a2e"/>
  <rect x="9" y="7" width="1" height="1" fill="#1a1a2e"/>
  <!-- Hoodie string -->
  <rect x="7" y="13" width="1" height="3" fill="#166534" opacity="0.6"/>
  <rect x="8" y="13" width="1" height="2" fill="#166534" opacity="0.6"/>
  <!-- Legs -->
  <rect x="5" y="20" width="2" height="4" fill="#2d3748"/>
  <rect x="9" y="20" width="2" height="4" fill="#2d3748"/>
  <!-- Shoes (sneakers) -->
  <rect x="4" y="22" width="3" height="2" fill="#dc2626"/>
  <rect x="9" y="22" width="3" height="2" fill="#dc2626"/>
</svg>
