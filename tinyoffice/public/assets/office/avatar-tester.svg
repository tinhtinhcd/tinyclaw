<svg xmlns="http://www.w3.org/2000/svg" width="16" height="24" viewBox="0 0 16 24" shape-rendering="crispEdges">
  <!-- Shadow -->
  <ellipse cx="8" cy="23" rx="5" ry="1" fill="#00000033"/>
  <!-- Body (lab coat) -->
  <rect x="4" y="12" width="8" height="8" fill="#e0e0e0"/>
  <rect x="5" y="12" width="6" height="8" fill="#f0f0f0"/>
  <!-- Coat buttons -->
  <rect x="8" y="14" width="1" height="1" fill="#999"/>
  <rect x="8" y="16" width="1" height="1" fill="#999"/>
  <!-- Undershirt -->
  <rect x="6" y="12" width="4" height="2" fill="#06b6d4"/>
  <!-- Arms -->
  <rect x="2" y="13" width="2" height="5" fill="#e0e0e0"/>
  <rect x="12" y="13" width="2" height="5" fill="#e0e0e0"/>
  <!-- Head -->
  <rect x="4" y="2" width="8" height="10" fill="#f0c8a0"/>
  <!-- Hair -->
  <rect x="4" y="2" width="8" height="3" fill="#d4a373"/>
  <rect x="3" y="3" width="2" height="3" fill="#d4a373"/>
  <!-- Goggles -->
  <rect x="4" y="5" width="4" height="3" fill="#0891b2" opacity="0.6"/>
  <rect x="8" y="5" width="4" height="3" fill="#0891b2" opacity="0.6"/>
  <rect x="4" y="5" width="8" height="1" fill="#333"/>
  <rect x="4" y="7" width="4" height="1" fill="#333"/>
  <rect x="8" y="7" width="4" height="1" fill="#333"/>
  <!-- Eyes behind goggles -->
  <rect x="6" y="6" width="1" height="1" fill="#1a1a2e"/>
  <rect x="9" y="6" width="1" height="1" fill="#1a1a2e"/>
  <!-- Legs -->
  <rect x="5" y="20" width="2" height="4" fill="#2d3748"/>
  <rect x="9" y="20" width="2" height="4" fill="#2d3748"/>
  <!-- Shoes -->
  <rect x="4" y="22" width="3" height="2" fill="#1a1a2e"/>
  <rect x="9" y="22" width="3" height="2" fill="#1a1a2e"/>
</svg>
